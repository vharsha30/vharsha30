    </path>
  </g>
  <g fill="#00d4ff" opacity="0.6">
    <circle cx="200" cy="140" r="3"/><circle cx="300" cy="100" r="2"/><circle cx="400" cy="160" r="2.5"/>
    <circle cx="500" cy="80" r="3"/><circle cx="600" cy="150" r="2"/><circle cx="700" cy="90" r="2.5"/>
    <circle cx="800" cy="130" r="2"/><circle cx="150" cy="120" r="2.5"/><circle cx="350" cy="70" r="3"/>
  </g>
  <g fill="#6366f1" opacity="0.5">
    <circle cx="120" cy="100" r="2.5"/><circle cx="280" cy="60" r="2"/><circle cx="450" cy="140" r="3"/>
    <circle cx="550" cy="60" r="2"/><circle cx="650" cy="120" r="2.5"/><circle cx="750" cy="80" r="2"/>
  </g>
  <g fill="#a855f7" opacity="0.4">
    <circle cx="80" cy="90" r="2"/><circle cx="160" cy="120" r="2.5"/><circle cx="320" cy="75" r="3"/>
    <circle cx="480" cy="100" r="2"/><circle cx="620" cy="55" r="2.5"/><circle cx="820" cy="95" r="2"/>
  </g>
  <g fill="#10b981" opacity="0.3">
    <circle cx="50" cy="130" r="1.5"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="90" r="1.5"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="50" r="1.5"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.8s" repeatCount="indefinite"/></circle>
