<svg viewBox="0 0 1000 200" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hdr-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0f1a30"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <radialGradient id="hdr-glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1000" height="200" fill="url(#hdr-bg)"/>
  <rect width="1000" height="200" fill="url(#hdr-glow)"/>
  <g fill="none" stroke-width="1.5" opacity="0.3">
    <path d="M100,180 Q150,120 200,140 T300,100 T400,160 T500,80 T600,150 T700,90 T800,130 T900,100" stroke="#00d4ff">
      <animate attributeName="stroke-dashoffset" from="2000" to="0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dasharray" values="5,15;10,10;5,15" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M50,160 Q120,100 200,130 T350,70 T450,140 T550,60 T650,120 T750,80 T850,110 T950,60" stroke="#6366f1" stroke-dasharray="4,12">
      <animate attributeName="stroke-dashoffset" from="1500" to="0" dur="12s" repeatCount="indefinite"/>
    </path>
    <path d="M0,140 Q80,90 160,120 T280,60 T400,130 T520,50 T640,110 T760,70 T880,100 T1000,50" stroke="#a855f7" stroke-dasharray="3,10">
